interface:
  display_name: "Quarkus LangChain4j Scaffolding"
  short_description: "Scaffold Quarkus + LangChain4j projects, AI services, agents, and RAG pipelines."
  brand_color: "#4695EB"
  default_prompt: "Use quarkus-langchain4j-scaffolding to scaffold a Quarkus + LangChain4j agentic component."

policy:
  allow_implicit_invocation: true

dependencies:
  tools:
    - type: "mcp"
      value: "quarkus-agent"
      description: "Quarkus Agents MCP server for project creation, extension discovery, docs, and dev-mode work."
    - type: "mcp"
      value: "context7"
      description: "Context7 MCP server for current library and framework documentation."
