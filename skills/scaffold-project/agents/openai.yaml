interface:
  display_name: "Scaffold Project (Quarkus + LangChain4j)"
  short_description: "Scaffold Quarkus + LangChain4j projects and add AI services, agents, RAG, and MCP components."
  brand_color: "#4695EB"
  default_prompt: "Use scaffold-project to scaffold a Quarkus + LangChain4j agentic component."

policy:
  allow_implicit_invocation: true

dependencies:
  tools:
    - type: "mcp"
      value: "quarkus-agent"
      description: "Quarkus Agents MCP server for project creation, extension discovery, docs, and dev-mode work."
    - type: "mcp"
      value: "context7"
      description: "Context7 MCP server for current library and framework documentation."
