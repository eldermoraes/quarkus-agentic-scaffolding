name: quality
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: ci/check-version-consistency.sh

  conventions-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: ci/check-conventions-parity.sh

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: shellcheck scripts/*.sh ci/*.sh

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: raven-actions/actionlint@v2

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: '**/*.md'
